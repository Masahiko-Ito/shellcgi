Content-Type: text/html

<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<title>検索結果</title>
	<script>
		window.history.forward()
		window.onload = function(){
			window.history.forward()
		}
		window.onpageshow = function(evt){
			if (evt.persisted){
				window.history.forward()
			}
		}
		window.onunload = function(){void(0)}
	</script>
</head>
<body>
	[@{tran}@]
	<h1>検索結果</h1>

	<form action="./shellcgi.cgi" method="POST" enctype="multipart/form-data">
		<input type="hidden" value="@:CGICTRL_SESSIONID:@" name="CGICTRL_SESSIONID">
		<input type="hidden" value="SAMPLE2" name="CGICTRL_TRAN">
		<input type="submit" value="戻る" name="submit">
	</form>
	<h2>検索文字列</h2>
	<pre>
@:search:@
	</pre>
	<h2>検索結果</h2>
	<pre>
@:result:@
	</pre>
	<pre>
@:message:@
	</pre>
</body>
</html>
