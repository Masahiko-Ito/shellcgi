Content-Type: text/html

<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<title>検索文字列を入力してください</title>
	<script>
		window.history.forward()
		window.onload = function(){
			window.history.forward()
		}
		window.onpageshow = function(evt){
			if (evt.persisted){
				window.history.forward()
			}
		}
		window.onunload = function(){void(0)}
	</script>
</head>
<body>
	[@{tran}@]
	<h1>検索文字列を入力してください</h1>

	<form action="./shellcgi.cgi" method="POST" enctype="multipart/form-data">
		<input type="hidden" value="@{CGICTRL_SESSIONID}@" name="CGICTRL_SESSIONID">
		<input type="hidden" value="SAMPLE1" name="CGICTRL_TRAN">
		<input type="text" size="80" value="@{search}@" maxlength="80" name="search"><br>
		<input type="submit" value="検索開始" name="submit">
		<a class="btn" href="../">初期メニューへ戻る</a>
	</form>
	<pre style="color:@{msgcolor=black}@">
@{message=}@
	</pre>
</body>
</html>
